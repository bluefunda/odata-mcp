services:
  minio:
    image: quay.io/minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  odata-mcp:
    image: bluefunda/odata-mcp:latest
    ports:
      - "8008:8008"
    environment:
      ODATA_MODE: sse
      ODATA_HTTP_PORT: "8008"
      # S3 / MinIO
      S3_ENDPOINT: minio:9000
      S3_BUCKET: odata-metadata
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_SECURE: "false"
      # OData service credentials
      ODATA_USERNAME: ${ODATA_USERNAME}
      ODATA_PASSWORD: ${ODATA_PASSWORD}
      ODATA_AUTH_TYPE: ${ODATA_AUTH_TYPE:-basic}
      # Optional: LLM entity-selection fallback
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  minio_data:
